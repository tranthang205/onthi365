<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Đăng nhập - OnThi365</title>
<link rel="stylesheet" href="style.css">
<style>
body { background: var(--gray-50); }
main {
  margin-top: var(--header-h); min-height: calc(100vh - var(--header-h));
  display: flex; align-items: center; justify-content: center;
  padding: 40px 20px;
}
.auth-card {
  width: 100%; max-width: 420px; background: var(--white);
  border-radius: var(--radius-lg); padding: 40px 36px;
  box-shadow: var(--shadow-xl); border: 1px solid var(--gray-100);
  animation: scaleIn 0.4s ease-out;
}
.auth-card .logo-center { display: flex; justify-content: center; margin-bottom: 28px; }
.auth-tabs { display: flex; margin-bottom: 28px; border-bottom: 2px solid var(--gray-100); }
.auth-tab {
  flex: 1; padding: 10px; text-align: center;
  font-size: 15px; font-weight: 600; color: var(--gray-400);
  border-bottom: 2px solid transparent; margin-bottom: -2px;
  transition: all 0.2s; cursor: pointer;
}
.auth-tab.active { color: var(--brand); border-bottom-color: var(--brand); }
.auth-tab:hover { color: var(--gray-700); }

.auth-form { display: none; }
.auth-form.active { display: block; animation: fadeUp 0.3s ease-out; }

.input-group { margin-bottom: 18px; }
.input-group label { display:block;font-size:13px;font-weight:600;color:var(--gray-700);margin-bottom:6px; }
.input-field { width:100%;padding:11px 14px;border:1.5px solid var(--gray-200);border-radius:var(--radius-sm);font-size:14px;transition:all 0.2s; }
.input-field:focus { outline:none;border-color:var(--brand);box-shadow:0 0 0 3px rgba(0,102,255,0.08); }

.remember-row {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 20px; font-size: 13px;
}
.remember-row label { display: flex; align-items: center; gap: 6px; color: var(--gray-600); cursor: pointer; }
.remember-row input { accent-color: var(--brand); }
.forgot-link { color: var(--brand); font-weight: 500; }
.forgot-link:hover { text-decoration: underline; }

.auth-btn {
  width: 100%; padding: 12px; border-radius: var(--radius-sm);
  font-size: 15px; font-weight: 700; transition: all 0.2s;
}
.auth-btn.primary { background: var(--brand); color: #fff; }
.auth-btn.primary:hover { background: var(--brand-dark); }

.divider { display:flex;align-items:center;gap:12px;margin:20px 0;font-size:13px;color:var(--gray-400); }
.divider::before,.divider::after { content:'';flex:1;height:1px;background:var(--gray-200); }

.social-login { display: flex; gap: 10px; }
.social-btn {
  flex: 1; padding: 10px; border-radius: var(--radius-sm);
  border: 1.5px solid var(--gray-200); display: flex; align-items: center;
  justify-content: center; gap: 8px; font-size: 13px; font-weight: 600;
  color: var(--gray-700); transition: all 0.2s;
}
.social-btn:hover { border-color: var(--gray-300); background: var(--gray-50); }

.auth-footer { text-align: center; margin-top: 20px; font-size: 13px; color: var(--gray-400); }
.auth-footer a { color: var(--brand); font-weight: 600; }
</style>
</head>
<body>

<header class="header" id="header">
  <div class="header-top">
    <a href="index.html" class="logo"><div class="logo-mark"></div><div class="logo-text">OnThi<em>365</em></div></a>
    <div class="header-search">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
      <input placeholder="Tìm khóa học, đề thi, tài liệu...">
    </div>
    <div class="header-actions">
      <a href="kich-hoat.html" class="btn-ghost">Kích hoạt thẻ</a>
      <a href="thi-online.html" class="btn-accent-sm">Thi online miễn phí</a>
      <a href="dang-nhap.html" class="btn-brand">Đăng nhập</a>
    </div>
  </div>
  <div class="header-sub">
    <a href="index.html" class="sub-link">Trang chủ</a>
    <a href="khoa-hoc.html" class="sub-link">Khóa học</a>
    <a href="thi-online.html" class="sub-link">Thi online</a>
    <a href="dau-truong.html" class="sub-link">Đấu trường</a>
    <a href="tai-lieu.html" class="sub-link">Tài liệu</a>
    <a href="bai-viet.html" class="sub-link">Bài viết</a>
    <a href="dashboard.html" class="sub-link">Lớp học của tôi</a>
  </div>
</header>

<main>
  <div class="auth-card">
    <div class="logo-center">
      <a href="index.html" class="logo"><div class="logo-mark"></div><div class="logo-text">OnThi<span>365</span></div></a>
    </div>

    <div class="auth-tabs">
      <div class="auth-tab active" data-tab="login">Đăng nhập</div>
      <div class="auth-tab" data-tab="register">Đăng ký</div>
    </div>

    <!-- LOGIN -->
    <form class="auth-form active" id="login">
      <div class="input-group">
        <label>Email hoặc số điện thoại</label>
        <input type="text" class="input-field" placeholder="Nhập email hoặc SĐT">
      </div>
      <div class="input-group">
        <label>Mật khẩu</label>
        <input type="password" class="input-field" placeholder="Nhập mật khẩu">
      </div>
      <div class="remember-row">
        <label><input type="checkbox"> Ghi nhớ đăng nhập</label>
        <a href="quen-mat-khau.html" class="forgot-link">Quên mật khẩu?</a>
      </div>
      <button class="auth-btn primary" onclick="event.preventDefault();window.location='dashboard.html'">Đăng nhập</button>
      <div class="divider">Hoặc đăng nhập bằng</div>
      <div class="social-login">
        <button class="social-btn" type="button"><span style="color:#4285F4;font-weight:800">G</span> Google</button>
        <button class="social-btn" type="button"><span style="color:#1877F2;font-weight:800">f</span> Facebook</button>
      </div>
    </form>

    <!-- REGISTER -->
    <form class="auth-form" id="register">
      <div class="input-group">
        <label>Họ và tên</label>
        <input type="text" class="input-field" placeholder="Nhập họ và tên">
      </div>
      <div class="input-group">
        <label>Email</label>
        <input type="email" class="input-field" placeholder="Nhập email">
      </div>
      <div class="input-group">
        <label>Số điện thoại</label>
        <input type="tel" class="input-field" placeholder="Nhập số điện thoại">
      </div>
      <div class="input-group">
        <label>Mật khẩu</label>
        <input type="password" class="input-field" placeholder="Tối thiểu 6 ký tự">
      </div>
      <div class="input-group">
        <label>Xác nhận mật khẩu</label>
        <input type="password" class="input-field" placeholder="Nhập lại mật khẩu">
      </div>
      <button class="auth-btn primary" style="margin-top:8px" onclick="event.preventDefault();window.location='dashboard.html'">Đăng ký</button>
      <div class="divider">Hoặc đăng ký bằng</div>
      <div class="social-login">
        <button class="social-btn" type="button"><span style="color:#4285F4;font-weight:800">G</span> Google</button>
        <button class="social-btn" type="button"><span style="color:#1877F2;font-weight:800">f</span> Facebook</button>
      </div>
    </form>

    <div class="auth-footer">
      Bằng việc đăng ký, bạn đồng ý với <a href="#">Điều khoản</a> và <a href="#">Chính sách bảo mật</a>
    </div>
  </div>
</main>

<script>
const tabs = document.querySelectorAll('.auth-tab');
const forms = document.querySelectorAll('.auth-form');
tabs.forEach(tab => {
  tab.addEventListener('click', () => {
    tabs.forEach(t => t.classList.remove('active'));
    forms.forEach(f => f.classList.remove('active'));
    tab.classList.add('active');
    document.getElementById(tab.dataset.tab).classList.add('active');
  });
});
</script>
</body>
</html>
