<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kết quả đấu trường - OnThi365</title>
<link rel="stylesheet" href="style.css">
<style>
body { background:var(--gray-950);color:#fff;min-height:100vh; }
main { display:flex;align-items:center;justify-content:center;min-height:100vh;padding:40px 20px; }

.result-wrap { width:100%;max-width:520px;text-align:center; }

/* Confetti canvas */
#confetti { position:fixed;inset:0;pointer-events:none;z-index:10; }

/* Score reveal */
.arena-result-card {
  background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.08);
  border-radius:var(--radius-xl);padding:40px 32px;
  animation:scaleIn 0.6s ease-out;position:relative;overflow:hidden;
}
.arena-result-card::before {
  content:'';position:absolute;top:-60%;left:50%;transform:translateX(-50%);
  width:300px;height:300px;border-radius:50%;
  background:radial-gradient(circle,rgba(255,107,44,0.08),transparent 70%);
}

.result-badge {
  display:inline-flex;align-items:center;gap:6px;padding:6px 16px;
  border-radius:var(--radius-full);font-size:13px;font-weight:700;
  margin-bottom:20px;position:relative;
}
.result-badge.great { background:rgba(16,185,129,0.15);color:#34D399; }
.result-badge.ok { background:rgba(245,158,11,0.15);color:#FBBF24; }

.result-score-big {
  font-size:72px;font-weight:900;margin-bottom:4px;position:relative;
  background:linear-gradient(135deg,#fff,rgba(255,255,255,0.7));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
}
.result-score-sub { font-size:16px;color:rgba(255,255,255,0.4);margin-bottom:24px; }
.result-title { font-size:14px;color:rgba(255,255,255,0.5);margin-bottom:28px; }

/* Stats */
.arena-stats-row {
  display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:28px;
}
.arena-stat-box {
  padding:16px;background:rgba(255,255,255,0.04);border-radius:var(--radius-md);
  border:1px solid rgba(255,255,255,0.06);
}
.arena-stat-box .val { font-size:24px;font-weight:800; }
.arena-stat-box .val.green { color:#34D399; }
.arena-stat-box .val.red { color:#F87171; }
.arena-stat-box .val.blue { color:#60A5FA; }
.arena-stat-box .lbl { font-size:12px;color:rgba(255,255,255,0.3);margin-top:2px; }

/* Rank animation */
.rank-section { margin-bottom:28px; }
.rank-label { font-size:13px;color:rgba(255,255,255,0.4);margin-bottom:8px; }
.rank-display {
  display:inline-flex;align-items:center;gap:8px;
  padding:10px 24px;border-radius:var(--radius-full);
  background:linear-gradient(135deg,rgba(245,158,11,0.15),rgba(249,115,22,0.15));
  border:1px solid rgba(245,158,11,0.2);
  font-size:20px;font-weight:800;color:#FBBF24;
}
.rank-display .trophy { font-size:24px; }

/* Leaderboard mini */
.mini-board { margin-bottom:28px; }
.mini-board h3 { font-size:14px;font-weight:700;color:rgba(255,255,255,0.5);margin-bottom:12px; }
.mini-row {
  display:flex;align-items:center;gap:10px;padding:8px 12px;
  border-radius:var(--radius-sm);margin-bottom:4px;font-size:13px;
}
.mini-row.you { background:rgba(0,102,255,0.1);border:1px solid rgba(0,102,255,0.2); }
.mini-rank { width:24px;font-weight:800;color:rgba(255,255,255,0.3); }
.mini-avatar {
  width:28px;height:28px;border-radius:50%;background:rgba(255,255,255,0.08);
  display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;
}
.mini-name { flex:1;font-weight:500; }
.mini-pts { font-weight:700;color:var(--accent); }

/* Actions */
.arena-actions { display:flex;gap:10px;justify-content:center;flex-wrap:wrap; }
.arena-act {
  padding:12px 24px;border-radius:var(--radius-md);font-size:14px;font-weight:700;
  transition:all 0.2s;display:inline-flex;align-items:center;gap:6px;
}
.arena-act.primary { background:var(--accent);color:#fff; }
.arena-act.primary:hover { background:var(--accent-dark);transform:translateY(-2px); }
.arena-act.outline { border:1.5px solid rgba(255,255,255,0.15);color:rgba(255,255,255,0.6); }
.arena-act.outline:hover { border-color:var(--brand);color:var(--brand); }
</style>
</head>
<body>

<canvas id="confetti"></canvas>

<main>
  <div class="result-wrap">
    <div class="arena-result-card">
      <div class="result-badge great" id="badge">Xuất sắc!</div>

      <div class="result-score-big" id="bigScore">0</div>
      <div class="result-score-sub">/ <span id="totalPts">70</span> điểm</div>
      <div class="result-title">Đấu trường lý thuyết – Phần 3</div>

      <div class="arena-stats-row">
        <div class="arena-stat-box"><div class="val green" id="correctCount">0</div><div class="lbl">Đúng</div></div>
        <div class="arena-stat-box"><div class="val red" id="wrongCount">0</div><div class="lbl">Sai</div></div>
        <div class="arena-stat-box"><div class="val blue" id="avgTime">0s</div><div class="lbl">TB/câu</div></div>
      </div>

      <div class="rank-section">
        <div class="rank-label">Xếp hạng của bạn</div>
        <div class="rank-display" id="rankDisplay">
          <span class="trophy">🏆</span>
          <span id="rankNum">#--</span>
          <span style="font-size:13px;font-weight:500;color:rgba(255,255,255,0.4)">/ 5,794 người</span>
        </div>
      </div>

      <div class="mini-board">
        <h3>Bảng xếp hạng</h3>
        <div class="mini-row"><span class="mini-rank">1</span><div class="mini-avatar">NL</div><span class="mini-name">Nguyễn Linh</span><span class="mini-pts">70</span></div>
        <div class="mini-row"><span class="mini-rank">2</span><div class="mini-avatar">TH</div><span class="mini-name">Trần Huy</span><span class="mini-pts">60</span></div>
        <div class="mini-row"><span class="mini-rank">3</span><div class="mini-avatar">PA</div><span class="mini-name">Phạm An</span><span class="mini-pts">60</span></div>
        <div class="mini-row you" id="myRow"><span class="mini-rank" id="myRank">--</span><div class="mini-avatar" style="background:var(--brand)">NH</div><span class="mini-name">Bạn (Nguyễn Huy)</span><span class="mini-pts" id="myPts">0</span></div>
      </div>

      <div class="arena-actions">
        <a href="choi-dau-truong.html" class="arena-act primary">Chơi lại</a>
        <a href="dau-truong.html" class="arena-act outline">Đấu trường khác</a>
        <a href="dashboard.html" class="arena-act outline">Lớp học của tôi</a>
      </div>
    </div>
  </div>
</main>

<script>
// Get data from game (or use defaults)
const score = parseInt(localStorage.getItem('arenaScore')) || 60;
const total = parseInt(localStorage.getItem('arenaTotal')) || 7;
const correct = parseInt(localStorage.getItem('arenaCorrect')) || 6;
const wrong = total - correct;
const totalPts = total * 10;

// Animate score count up
function countUp(el, end, duration, suffix='') {
  const start = performance.now();
  function update(now) {
    const p = Math.min((now-start)/duration, 1);
    const eased = 1 - Math.pow(1-p, 3);
    el.textContent = Math.round(end * eased) + suffix;
    if(p<1) requestAnimationFrame(update);
  }
  requestAnimationFrame(update);
}

setTimeout(()=>{
  countUp(document.getElementById('bigScore'), score, 1500);
  countUp(document.getElementById('correctCount'), correct, 1000);
  countUp(document.getElementById('wrongCount'), wrong, 1000);
  document.getElementById('avgTime').textContent = Math.round(140/total) + 's';
  document.getElementById('totalPts').textContent = totalPts;
  document.getElementById('myPts').textContent = score;
}, 300);

// Rank reveal
setTimeout(()=>{
  const rank = score >= 60 ? 12 : score >= 40 ? 45 : 120;
  document.getElementById('rankNum').textContent = '#' + rank;
  document.getElementById('myRank').textContent = rank;
}, 1800);

// Confetti for good scores
if(score >= 50) {
  const canvas = document.getElementById('confetti');
  const ctx = canvas.getContext('2d');
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
  const particles = [];
  const colors = ['#FF6B2C','#0066FF','#10B981','#F59E0B','#EC4899','#8B5CF6'];

  for(let i=0;i<80;i++){
    particles.push({
      x: Math.random()*canvas.width,
      y: Math.random()*canvas.height - canvas.height,
      vx: (Math.random()-0.5)*4,
      vy: Math.random()*3+2,
      size: Math.random()*6+3,
      color: colors[Math.floor(Math.random()*colors.length)],
      rotation: Math.random()*360,
      rotSpeed: (Math.random()-0.5)*10
    });
  }

  function drawConfetti() {
    ctx.clearRect(0,0,canvas.width,canvas.height);
    let active = false;
    particles.forEach(p=>{
      p.x += p.vx;
      p.y += p.vy;
      p.vy += 0.05;
      p.rotation += p.rotSpeed;
      if(p.y < canvas.height+20) active = true;

      ctx.save();
      ctx.translate(p.x, p.y);
      ctx.rotate(p.rotation*Math.PI/180);
      ctx.fillStyle = p.color;
      ctx.fillRect(-p.size/2, -p.size/2, p.size, p.size*0.6);
      ctx.restore();
    });
    if(active) requestAnimationFrame(drawConfetti);
  }
  setTimeout(drawConfetti, 500);
}
</script>
</body>
</html>
