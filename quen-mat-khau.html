<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quên mật khẩu - OnThi365</title>
<link rel="stylesheet" href="style.css">
<style>
body{background:var(--gray-50)}
main{margin-top:var(--header-h);min-height:calc(100vh - var(--header-h));display:flex;align-items:center;justify-content:center;padding:40px 20px}
.reset-card{width:100%;max-width:400px;background:var(--white);border-radius:var(--radius-lg);padding:36px;box-shadow:var(--shadow-xl);border:1px solid var(--gray-100);animation:scaleIn 0.4s ease-out}
.reset-card .logo-center{display:flex;justify-content:center;margin-bottom:24px}
.reset-card h1{font-size:22px;font-weight:800;text-align:center;margin-bottom:6px}
.reset-card .sub{font-size:14px;color:var(--gray-500);text-align:center;margin-bottom:24px}
.input-group{margin-bottom:16px}
.input-group label{display:block;font-size:13px;font-weight:600;color:var(--gray-700);margin-bottom:6px}
.input-field{width:100%;padding:11px 14px;border:1.5px solid var(--gray-200);border-radius:var(--radius-sm);font-size:14px;transition:all 0.2s}
.input-field:focus{outline:none;border-color:var(--brand);box-shadow:0 0 0 3px rgba(0,102,255,0.08)}
.reset-btn{width:100%;padding:12px;border-radius:var(--radius-sm);background:var(--brand);color:#fff;font-size:15px;font-weight:700;margin-top:8px;transition:all 0.2s}
.reset-btn:hover{background:var(--brand-dark)}
.back-link{display:block;text-align:center;margin-top:16px;font-size:13px;color:var(--brand);font-weight:600}
</style>
</head>
<body>
<header class="header" id="header">
  <div class="header-top">
    <a href="index.html" class="logo"><div class="logo-mark"></div><div class="logo-text">OnThi<em>365</em></div></a>
    <div class="header-search"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg><input placeholder="Tìm khóa học, đề thi, tài liệu..."></div>
    <div class="header-actions"><a href="dang-nhap.html" class="btn-brand">Đăng nhập</a></div>
  </div>
</header>
<main>
  <div class="reset-card">
    <div class="logo-center"><a href="index.html" class="logo"><div class="logo-mark"></div><div class="logo-text">OnThi<em>365</em></div></a></div>
    <h1>Quên mật khẩu?</h1>
    <p class="sub">Nhập email đã đăng ký, chúng tôi sẽ gửi link đặt lại mật khẩu</p>
    <form>
      <div class="input-group"><label>Email</label><input type="email" class="input-field" placeholder="Nhập email đã đăng ký"></div>
      <button class="reset-btn">Gửi link đặt lại mật khẩu</button>
    </form>
    <a href="dang-nhap.html" class="back-link">← Quay lại đăng nhập</a>
  </div>
</main>
</body>
</html>
